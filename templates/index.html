<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Discoveries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        .ambient-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(18, 0, 43, 0.8) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 30%);
            animation: slowSpin 30s linear infinite;
            z-index: -1;
        }
        @keyframes slowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }
        .text-gradient {
            background: linear-gradient(135deg, #00d4ff 0%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .movie-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        .movie-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: #00d4ff;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center relative">
    <div class="ambient-bg"></div>
    <main class="w-full max-w-6xl px-4 py-16 md:py-24 flex flex-col items-center z-10 relative">
        <div class="text-center mb-12 w-full max-w-3xl">
            <div class="inline-block mb-4 px-4 py-1.5 rounded-full glass-panel text-xs font-semibold tracking-wider text-cyan-400 uppercase">
                Truncated SVD Engine
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
                Cinematic <br/> <span class="text-gradient">Discoveries</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-light mb-8">
                Enter a movie you love, and we will try to find your next favorite film.
            </p>
            <form id="searchForm" class="relative flex items-center w-full max-w-2xl mx-auto">
                <div class="absolute left-4 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input 
                    type="text" 
                    id="movieInput" 
                    class="search-input w-full py-4 pl-12 pr-32 rounded-full text-lg text-white placeholder-gray-500 shadow-2xl"
                    placeholder="e.g., The Dark Knight, Inception..."
                    autocomplete="off"
                    required
                >
                <button 
                    type="submit" 
                    class="absolute right-2 px-6 py-2.5 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-semibold transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                    Discover
                </button>
            </form>
        </div>
        <div id="loadingState" class="hidden flex-col items-center py-12">
            <span class="loader mb-4"></span>
            <p class="text-cyan-400 font-medium animate-pulse">Searching for your favorite...</p>
        </div>
        <div id="errorState" class="hidden glass-panel w-full max-w-md p-6 rounded-2xl text-center border-red-500/30">
            <svg class="w-12 h-12 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h3 class="text-xl font-bold text-white mb-2" id="errorTitle">Movie Not Found</h3>
            <p class="text-gray-400" id="errorMessage"></p>
        </div>
        <div id="resultsSection" class="hidden w-full opacity-0 transition-opacity duration-1000 ease-in-out">
            <div class="flex items-center justify-between border-b border-white/10 pb-4 mb-8">
                <h2 class="text-2xl md:text-3xl font-light">
                    Because you liked <span id="searchedMovieTitle" class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500"></span>.....
                </h2>
                <span class="hidden md:inline-block glass-panel px-4 py-1 rounded-full text-sm text-gray-400">
                    Top Matches
                </span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="movieGrid">
            </div>
        </div>
    </main>
    <footer class="mt-auto py-8 text-center text-gray-600 text-sm z-10 w-full glass-panel border-t-0 rounded-none">
        <p>Built for the 32M MovieLens Dataset • Connected to Python Flask Backend</p>
    </footer>
    <script>
        const form = document.getElementById('searchForm');
        const input = document.getElementById('movieInput');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const resultsSection = document.getElementById('resultsSection');
        const movieGrid = document.getElementById('movieGrid');
        const searchedMovieTitle = document.getElementById('searchedMovieTitle');
        function createCard(movie) {
            const similarityPercent = (movie.similarity_score * 100).toFixed(1);
            let scoreColor = "text-cyan-400";
            let barColor = "bg-cyan-400";
            if (movie.similarity_score < 0.85) {
                scoreColor = "text-yellow-400";
                barColor = "bg-yellow-400";
            }
            return `
                <div class="movie-card glass-panel rounded-2xl p-6 flex flex-col h-full cursor-pointer group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="glass-panel px-3 py-1 rounded text-xs font-mono text-gray-400">
                            ID: ${movie.movieId}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-400">Sim:</span>
                            <span class="font-bold ${scoreColor}">${similarityPercent}%</span>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-1 group-hover:text-cyan-300 transition-colors">
                        ${movie.title}
                    </h3>
                    <p class="text-sm text-gray-400 mb-6">TMDB ID: ${movie.tmdbId || 'N/A'}</p>
                    <div class="mt-auto">
                        <div class="w-full bg-gray-800 rounded-full h-1.5 mb-2">
                            <div class="${barColor} h-1.5 rounded-full" style="width: ${similarityPercent}%"></div>
                        </div>
                        <p class="text-xs text-gray-500 text-right">Taste Match</p>
                    </div>
                </div>
            `;
        }
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;
            errorState.classList.add('hidden');
            resultsSection.classList.add('hidden');
            resultsSection.classList.remove('opacity-100');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            movieGrid.innerHTML = '';
            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ movie_title: query })
                });
                const data = await response.json();
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                if (!response.ok) {
                    errorState.classList.remove('hidden');
                    document.getElementById('errorMessage').textContent = data.error || "An error occurred fetching recommendations.";
                    return;
                }
                searchedMovieTitle.textContent = data.searched_for;
                data.recommendations.forEach((movie, index) => {
                    const cardHtml = createCard(movie);
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = cardHtml;
                    const cardEl = tempDiv.firstElementChild;
                    cardEl.style.opacity = '0';
                    cardEl.style.transform = 'translateY(20px)';
                    cardEl.style.transition = `all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${index * 0.1}s`;
                    movieGrid.appendChild(cardEl);
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            cardEl.style.opacity = '1';
                            cardEl.style.transform = 'translateY(0)';
                        }, 50);
                    });
                });
                resultsSection.classList.remove('hidden');
                setTimeout(() => {
                    resultsSection.classList.add('opacity-100');
                }, 10);
            } catch (error) {
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                errorState.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = "Failed to reach the backend. Is your Flask app (app.py) running?";
            }
        });
    </script>
</body>
</html>
